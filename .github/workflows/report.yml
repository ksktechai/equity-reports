name: Generate equity report from issue

# Issue-driven flow (README "Option C"): open an issue titled
#   "IPO: <name>"  or  "STOCK: <name>"  (case-insensitive)
# and this workflow researches, writes reports/<type>/<slug>/index.html,
# regenerates the landing index, commits, comments the Pages URL, and closes
# the issue.

on:
  issues:
    types: [opened, edited]

# Least privilege: write repo contents (commit the report + index) and write
# issues (comment + close). Nothing else.
permissions:
  contents: write
  issues: write

# Serialize so two issues can never race on the shared root index.html.
# Do not cancel an in-flight run — queue behind it instead.
concurrency:
  group: equity-report-index
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue title (type + company + slug)
        id: parse
        # The title is untrusted input — read it from the environment, never
        # interpolate it directly into the script (avoids shell injection).
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          shopt -s nocasematch
          if [[ "$ISSUE_TITLE" =~ ^[[:space:]]*(IPO|STOCK):[[:space:]]*(.+)$ ]]; then
            TYPE="$(echo "${BASH_REMATCH[1]}" | tr '[:upper:]' '[:lower:]')"
            COMPANY="$(echo "${BASH_REMATCH[2]}" | sed -E 's/[[:space:]]+$//')"
            # Identical slug logic to new-report.sh and the slash commands.
            SLUG="$(bash scripts/slugify.sh "$COMPANY")"
            if [[ -z "$SLUG" ]]; then
              echo "match=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Could not derive a slug from company '$COMPANY' — skipping."
              exit 0
            fi
            {
              echo "match=true"
              echo "type=$TYPE"
              echo "company=$COMPANY"
              echo "slug=$SLUG"
              echo "outfile=reports/$TYPE/$SLUG/index.html"
              echo "prompt=prompts/$TYPE-analysis.md"
            } >> "$GITHUB_OUTPUT"
            echo "Matched: type=$TYPE company='$COMPANY' slug=$SLUG"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "Title does not match 'IPO: <name>' or 'STOCK: <name>' — skipping."
          fi

      - name: Setup Node
        if: steps.parse.outputs.match == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.parse.outputs.match == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate report (headless Claude Code)
        if: steps.parse.outputs.match == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT_FILE: ${{ steps.parse.outputs.prompt }}
          OUT_FILE: ${{ steps.parse.outputs.outfile }}
          COMPANY: ${{ steps.parse.outputs.company }}
          TYPE: ${{ steps.parse.outputs.type }}
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set."
            exit 1
          fi
          GEN_DATE="$(date -u +%Y-%m-%d)"
          PROMPT_HASH="$(git rev-parse --short HEAD)"
          mkdir -p "$(dirname "$OUT_FILE")"

          RUN_INSTRUCTIONS="
          COMPANY TO ANALYSE: $COMPANY
          REPORT TYPE: $TYPE
          GENERATION DATE (UTC): $GEN_DATE
          PROMPT VERSION (git commit): $PROMPT_HASH

          Write the final self-contained HTML report to: $OUT_FILE
          Immediately after the opening <head> tag, include this provenance comment
          (keys separated by ';') so the landing-page builder can list and date it:
          <!-- report-meta: type=$TYPE; slug=$SLUG; name=$COMPANY; generated=$GEN_DATE; prompt=$PROMPT_HASH -->
          Stamp the generation date and prompt version ($PROMPT_HASH) into the footer.
          Output ONLY the HTML file via the Write tool. Do not print the HTML to stdout."

          claude --bare -p "$(cat "$PROMPT_FILE")
          $RUN_INSTRUCTIONS" \
            --allowedTools "WebSearch,WebFetch,Read,Write" \
            --output-format json \
            > .last-run.json

      - name: Guardrails (exists, strip fences, sanity-check HTML)
        if: steps.parse.outputs.match == 'true'
        env:
          OUT_FILE: ${{ steps.parse.outputs.outfile }}
        run: |
          set -euo pipefail
          if [[ ! -s "$OUT_FILE" ]]; then
            echo "::error::Expected report not written or empty: $OUT_FILE"
            exit 1
          fi
          # Strip a leading ```html / ``` fence and a trailing ``` fence if present.
          if head -n1 "$OUT_FILE" | grep -qE '^```'; then
            echo "Stripping stray code fences from output"
            sed -i -E '1{/^```/d}; ${/^```$/d}' "$OUT_FILE"
          fi
          if ! grep -qiE '<html|<!doctype' "$OUT_FILE"; then
            echo "::error::$OUT_FILE does not look like a full HTML document."
            exit 1
          fi

      - name: Rebuild landing index
        if: steps.parse.outputs.match == 'true'
        run: node scripts/build-index.js

      - name: Commit and push
        if: steps.parse.outputs.match == 'true'
        env:
          OUT_FILE: ${{ steps.parse.outputs.outfile }}
          TYPE: ${{ steps.parse.outputs.type }}
          COMPANY: ${{ steps.parse.outputs.company }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .last-run.json
          git add "$OUT_FILE" index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add $TYPE report: $COMPANY ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Comment Pages URL and close the issue
        if: steps.parse.outputs.match == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TYPE: ${{ steps.parse.outputs.type }}
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          set -euo pipefail
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/reports/${TYPE}/${SLUG}/"
          BODY="Report published (education-only — not financial advice):

          $PAGES_URL

          The root index has been regenerated. If GitHub Pages was just enabled, the URL may take a minute to go live."
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY"
          gh issue close "$ISSUE_NUMBER" --repo "$REPO"
